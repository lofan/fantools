<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Info Fetcher v0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .animate-in {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 1.25rem;
            height: 1.25rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none; }
    </style>
</head>
<body class="text-slate-900 p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-red-600 rounded-2xl mb-4 shadow-lg shadow-red-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.42 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.42-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-800">YouTube Info Fetcher</h1>
            <p class="text-slate-500 mt-2">Instantly get the title and preview of any YouTube video</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 transition-all focus-within:shadow-md">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1 group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    </div>
                    <input
                        type="text"
                        id="videoUrlInput"
                        class="block w-full pl-11 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all outline-none text-slate-700 placeholder:text-slate-400"
                        placeholder="Paste YouTube URL or Embed code..."
                    >
                    <button
                        id="clearBtn"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors hidden"
                        title="Clear input"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bg-slate-200/50 rounded-full p-0.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="flex gap-2">
                    <button
                        id="fetchBtn"
                        class="flex-1 md:flex-none px-8 py-3 bg-red-600 hover:bg-red-700 disabled:bg-slate-300 text-white font-semibold rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2"
                    >
                        <span id="btnLoader" class="loader hidden"></span>
                        <span id="btnText" class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Fetch
                        </span>
                    </button>
                    
                    <button
                        id="resetAllBtn"
                        class="px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all active:scale-95 flex items-center justify-center hidden"
                        title="Reset everything"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <div id="errorMessage" class="mt-4 p-3 bg-red-50 text-red-600 rounded-lg flex items-center gap-2 text-sm border border-red-100 hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="errorText"></span>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="space-y-6 hidden animate-in">
            <!-- Combined Info Card -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Video Details</h2>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        <button 
                            id="copyMarkdownBtn"
                            class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all bg-slate-900 text-white hover:bg-slate-800 shadow-slate-200 shadow-lg active:scale-95 text-xs md:text-sm"
                        >
                            <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <span class="copy-text">Markdown</span>
                        </button>
                        <button 
                            id="copySimpleBtn"
                            class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-200 active:scale-95 text-xs md:text-sm"
                        >
                            <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                            <span class="copy-text">Simple Text</span>
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Title</label>
                        <p id="displayTitle" class="text-lg font-bold text-slate-800 leading-tight"></p>
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Standard URL</label>
                        <div class="flex items-center gap-3">
                            <span id="displayUrl" class="text-slate-600 truncate bg-slate-50 px-3 py-2 rounded-lg flex-1 border border-slate-100 font-mono text-sm"></span>
                            <a 
                                id="externalLink"
                                href="#"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100"
                                title="Open in YouTube"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Card -->
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="aspect-video bg-slate-100 rounded-xl overflow-hidden">
                    <iframe
                        id="videoPreview"
                        width="100%"
                        height="100%"
                        src=""
                        title="YouTube video player"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                        class="w-full h-full"
                    ></iframe>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <footer class="mt-12 text-center text-slate-400 text-xs">
            <p>Powered by Noembed oEmbed API</p>
        </footer>
    </div>

    <script>
        const inputField = document.getElementById('videoUrlInput');
        const clearBtn = document.getElementById('clearBtn');
        const fetchBtn = document.getElementById('fetchBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const resultsSection = document.getElementById('resultsSection');
        const displayTitle = document.getElementById('displayTitle');
        const displayUrl = document.getElementById('displayUrl');
        const externalLink = document.getElementById('externalLink');
        const videoPreview = document.getElementById('videoPreview');
        
        const copyMarkdownBtn = document.getElementById('copyMarkdownBtn');
        const copySimpleBtn = document.getElementById('copySimpleBtn');
        
        const btnLoader = document.getElementById('btnLoader');
        const btnText = document.getElementById('btnText');

        let currentVideoId = '';
        let currentTitle = '';

        // Extract Video ID
        function extractVideoId(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regExp);
            return (match && match[1]) ? match[1] : null;
        }

        // Fetch Logic
        async function handleFetch() {
            const url = inputField.value.trim();
            if (!url) return;

            hideError();
            resultsSection.classList.add('hidden');
            
            const id = extractVideoId(url);
            if (!id) {
                showError('Please enter a valid YouTube URL. Could not detect video ID.');
                return;
            }

            currentVideoId = id;
            setLoading(true);

            try {
                const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
                const data = await response.json();

                if (data.title) {
                    currentTitle = data.title;
                    displayTitle.textContent = data.title;
                    const standardUrl = `https://www.youtube.com/watch?v=${id}`;
                    displayUrl.textContent = standardUrl;
                    externalLink.href = standardUrl;
                    videoPreview.src = `https://www.youtube.com/embed/${id}`;
                    
                    resultsSection.classList.remove('hidden');
                    resetAllBtn.classList.remove('hidden');
                } else {
                    showError('Could not retrieve video information. The video might be private or deleted.');
                }
            } catch (err) {
                showError('Failed to connect to the metadata service. Please check your connection.');
            } finally {
                setLoading(false);
            }
        }

        /**
         * Copy text to clipboard
         * @param {string} text 
         * @param {HTMLElement} btnElement 
         * @param {string} successText 
         * @param {string} originalText 
         */
        function performCopy(text, btnElement, successText, originalText) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                const textSpan = btnElement.querySelector('.copy-text');
                const icon = btnElement.querySelector('.copy-icon');
                
                // Visual feedback
                const originalBg = btnElement.className;
                if (btnElement.id === 'copyMarkdownBtn') {
                    btnElement.classList.replace('bg-slate-900', 'bg-green-600');
                } else {
                    btnElement.classList.replace('bg-slate-100', 'bg-green-100');
                    btnElement.classList.replace('text-slate-700', 'text-green-700');
                }
                
                textSpan.textContent = successText;
                
                setTimeout(() => {
                    btnElement.className = originalBg;
                    textSpan.textContent = originalText;
                }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        }

        function setLoading(isLoading) {
            fetchBtn.disabled = isLoading;
            if (isLoading) {
                btnLoader.classList.remove('hidden');
                btnText.classList.add('hidden');
            } else {
                btnLoader.classList.add('hidden');
                btnText.classList.remove('hidden');
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove('hidden');
            resetAllBtn.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function resetAll() {
            inputField.value = '';
            clearBtn.classList.add('hidden');
            resultsSection.classList.add('hidden');
            resetAllBtn.classList.add('hidden');
            hideError();
            videoPreview.src = '';
            currentVideoId = '';
            currentTitle = '';
        }

        // Event Listeners
        inputField.addEventListener('input', () => {
            if (inputField.value.trim().length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        });

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleFetch();
        });

        fetchBtn.addEventListener('click', handleFetch);
        
        clearBtn.addEventListener('click', () => {
            inputField.value = '';
            clearBtn.classList.add('hidden');
            inputField.focus();
        });

        resetAllBtn.addEventListener('click', resetAll);

        copyMarkdownBtn.addEventListener('click', () => {
            const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
            performCopy(`[${currentTitle}](${url})`, copyMarkdownBtn, 'Copied MD!', 'Markdown');
        });

        copySimpleBtn.addEventListener('click', () => {
            const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
            performCopy(`${currentTitle} ${url}`, copySimpleBtn, 'Copied Text!', 'Simple Text');
        });

    </script>
</body>
</html>
